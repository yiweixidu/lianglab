<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // 将当前路径保存到查询参数，然后跳转到带仓库前缀的首页
        const redirectPath = window.location.pathname + window.location.search + window.location.hash;
        // 关键修改：加上仓库名前缀 /lianglab/
        window.location.href = '/lianglab/?path=' + encodeURIComponent(redirectPath);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
